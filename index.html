<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2GO Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        nav { display: none; }
        nav.show { display: block; }
        #app-container {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        #app-container.with-nav {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#/dashboard" onclick="routeTo('/dashboard'); return false;">
                    <i class="bi bi-droplet-fill me-2"></i>
                    H2GO Dashboard
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#/dashboard" data-route="/dashboard" onclick="routeTo('/dashboard'); return false;">
                                <i class="bi bi-house-door me-1"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#/orders" data-route="/orders" onclick="routeTo('/orders'); return false;">
                                <i class="bi bi-receipt me-1"></i>Orders
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#/inventory" data-route="/inventory" onclick="routeTo('/inventory'); return false;">
                                <i class="bi bi-box-seam me-1"></i>Inventory
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#/staff" data-route="/staff" onclick="routeTo('/staff'); return false;">
                                <i class="bi bi-people me-1"></i>Staff
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#/reports" data-route="/reports" onclick="routeTo('/reports'); return false;">
                                <i class="bi bi-graph-up me-1"></i>Reports
                            </a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="logout(); return false;">
                                <i class="bi bi-box-arrow-right me-1"></i>Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Dynamic Route Container -->
        <div id="app-container" class="container-fluid pt-4 pb-4">
            <!-- Routes will render here -->
        </div>
    </div>

    <!-- Scripts in correct order -->
    <script>
        window.APP_BUILD = '2026.04.25-03';
    </script>

    <!-- Firebase config -->
    <script src="js/firebase-config.js?v=20260425-03"></script>
    
    <!-- Router system -->
    <script src="js/router.js?v=20260425-03"></script>
    
    <!-- Route handlers -->
    <script src="js/routes.js?v=20260425-03"></script>
    
    <!-- Modal templates and helpers -->
    <script src="js/modals.js?v=20260425-03"></script>
    
    <!-- Display functions -->
    <script src="js/display.js?v=20260425-03"></script>
    
    <!-- Core app logic -->
    <script src="js/app.js?v=20260425-03"></script>
    <script src="js/dashboard.js?v=20260425-03"></script>
    <script src="js/inventory.js?v=20260425-03"></script>
    
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
